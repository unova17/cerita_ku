<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard Pro - Manajer Novel</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bg-main: #0f172a; --bg-card: #1e293b; --text-main: #f8fafc; --accent: #0284c7; --border: #334155; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 20px; font-family: sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: var(--bg-card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input, select { width: 100%; background: #0f172a; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="card">
            <h2 id="formTitle">Tambah Novel Baru</h2>
            <input type="hidden" id="editKey">
            <input type="text" id="novelTitle" placeholder="Judul Novel">
            <input type="text" id="novelAuthor" placeholder="Nama Penulis">
            <input type="text" id="novelCover" placeholder="URL Gambar Cover">
            <select id="novelStatus">
                <option value="On Going">On Going</option>
                <option value="Completed">Completed</option>
                <option value="Hiatus">Hiatus</option>
            </select>
            <select id="novelRelationType">
                <option value="Standalone">Standalone</option>
                <option value="Sequel">Sequel</option>
                <option value="Prequel">Prequel</option>
            </select>
            <input type="text" id="novelRelationTarget" placeholder="ID Target Novel (Opsional)">
            <button class="btn" onclick="saveNovel()">Simpan Perubahan</button>
            <button class="btn" style="background:#475569;" onclick="resetForm()">Reset Form</button>
        </div>

        <div class="card">
            <h2>Daftar Koleksi</h2>
            <div id="novelListContainer">Memuat...</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const db = getDatabase(initializeApp({ 
apiKey: "AIzaSyAPirxknnoLy0poK0COXOaIfRSQ2MRNt-A",
    authDomain: "ceritakuw17.firebaseapp.com",
    databaseURL: "https://ceritakuw17-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ceritakuw17",
    storageBucket: "ceritakuw17.firebasestorage.app",
    messagingSenderId: "523139592598",
    appId: "1:523139592598:web:521645fc4e0e6367baedb7",
    measurementId: "G-BY7JJH5YLL"


 }));
    let globalLibrary = {};

    onValue(ref(db, 'library/'), (snapshot) => {
        globalLibrary = snapshot.val() || {};
        renderList();
    });

    // FUNGSI SIMPAN (TAMBAH ATAU UPDATE)
    window.saveNovel = function() {
        const key = document.getElementById('editKey').value;
        const data = {
            title: document.getElementById('novelTitle').value,
            author: document.getElementById('novelAuthor').value,
            coverUrl: document.getElementById('novelCover').value,
            status: document.getElementById('novelStatus').value,
            relType: document.getElementById('novelRelationType').value,
            relTarget: document.getElementById('novelRelationTarget').value
        };

        const targetRef = key ? ref(db, `library/${key}`) : push(ref(db, 'library/'));
        set(targetRef, data).then(() => {
            Swal.fire('Sukses', 'Data novel berhasil disimpan!', 'success');
            resetForm();
        });
    };

    // FUNGSI ISI FORM (LOAD DATA KE FORM)
    window.editNovel = function(key) {
        const n = globalLibrary[key];
        document.getElementById('editKey').value = key;
        document.getElementById('novelTitle').value = n.title;
        document.getElementById('novelAuthor').value = n.author;
        document.getElementById('novelCover').value = n.coverUrl || '';
        document.getElementById('novelStatus').value = n.status;
        document.getElementById('novelRelationType').value = n.relType;
        document.getElementById('novelRelationTarget').value = n.relTarget || '';
        document.getElementById('formTitle').innerText = "Edit Novel: " + n.title;
    };

    window.resetForm = function() {
        document.getElementById('editKey').value = '';
        document.getElementById('formTitle').innerText = "Tambah Novel Baru";
        // Bersihkan input lainnya...
    };

    function renderList() {
        const cont = document.getElementById('novelListContainer');
        cont.innerHTML = '';
        Object.keys(globalLibrary).forEach(key => {
            cont.innerHTML += `<div class="card" style="margin-bottom:10px;">
                <strong>${globalLibrary[key].title}</strong><br>
                <button class="btn" onclick="editNovel('${key}')">Edit Identitas</button>
            </div>`;
        });
    }
</script>
</body>
</html>
