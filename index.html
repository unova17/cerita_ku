<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koleksi Novel Digital - Halaman Pembaca V6</title>
    <style>
        :root {
            --bg-color: #f7f4eb;
            --text-color: #2b2b2b;
            --panel-bg: #ffffff;
            --accent-color: #8c6239;
            --border-color: #e2d9c8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Georgia', serif; }

        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; line-height: 1.8; }

        .container { max-width: 800px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 2px solid var(--border-color); }
        header h1 { color: var(--accent-color); font-size: 2.5rem; margin-bottom: 10px; }

        .novel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; margin-bottom: 40px; }
        
        .novel-card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .novel-card:hover { transform: translateY(-5px); }
        .novel-card img { width: 100%; height: 280px; object-fit: cover; background: #e5e5e5; }
        .novel-card-info { padding: 15px; }
        .novel-card-info h3 { font-size: 1.1rem; margin-bottom: 5px; color: #111; }
        .novel-card-info p { font-size: 0.85rem; color: #666; font-style: italic; }

        .reader-section { background: var(--panel-bg); border: 1px solid var(--border-color); padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .back-btn { background: var(--accent-color); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; margin-bottom: 20px; font-family: sans-serif; }
        
        .chapter-selector { margin-bottom: 30px; width: 100%; padding: 10px; font-size: 1rem; border-radius: 6px; border: 1px solid var(--border-color); }
        
        .content-area p { margin-bottom: 20px; font-size: 1.15rem; text-align: justify; }
        .content-area img { max-width: 100%; display: block; margin: 30px auto; border-radius: 6px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

        /* AREA KOMENTAR */
        .comment-section { margin-top: 50px; padding-top: 30px; border-top: 2px dashed var(--border-color); font-family: sans-serif; }
        .comment-section h3 { margin-bottom: 20px; color: var(--accent-color); }
        
        .comment-form input, .comment-form textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.95rem; font-family: sans-serif; }
        .comment-form button { background: var(--accent-color); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .comments-list { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; }
        .comment-item { background: #fdfdfd; border: 1px solid #eee; padding: 15px; border-radius: 8px; }
        .comment-header { display: flex; justify-content: space-between; font-size: 0.85rem; color: #666; margin-bottom: 8px; font-weight: bold; }
        .comment-body { font-size: 0.95rem; color: #333; }
        
        .admin-reply { background: #f0fdf4; border-left: 4px solid #10b981; margin-top: 10px; padding: 10px 15px; border-radius: 0 8px 8px 0; }
        .admin-reply-header { font-size: 0.8rem; color: #15803d; font-weight: bold; margin-bottom: 4px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <!-- SEKSI PERPUSTAKAAN UTAMA -->
        <div id="libraryView">
            <header>
                <h1>Koleksi Novel Kita</h1>
                <p>Silakan pilih novel gratis terbaik di bawah ini untuk mulai membaca</p>
            </header>
            <div class="novel-grid" id="novelGridContainer"></div>
        </div>

        <!-- SEKSI BACA CERITA & KOMENTAR -->
        <div id="readerView" class="hidden">
            <button class="back-btn" id="backToLibBtn">⬅ Kembali ke Rak Buku</button>
            <div class="reader-section">
                <h2 id="readerNovelTitle" style="margin-bottom: 5px; color: var(--accent-color);">Judul Novel</h2>
                <p id="readerNovelAuthor" style="font-size:0.9rem; color:#666; margin-bottom:20px; font-style:italic;">Penulis</p>
                
                <select id="chapterSelect" class="chapter-selector"></select>
                
                <h3 id="readerChapterTitle" style="margin-bottom: 25px; text-align: center; border-bottom: 1px solid #eee; padding-bottom: 10px;">Bab X: ...</h3>
                <div id="chapterContent" class="content-area"></div>

                <!-- FORM & LIST KOMENTAR PER BAB -->
                <div class="comment-section">
                    <h3>💬 Diskusi Bab (<span id="commentCount">0</span>)</h3>
                    
                    <div class="comment-form">
                        <input type="text" id="commentorName" placeholder="Nama Anda..." required>
                        <textarea id="commentorText" rows="3" placeholder="Tulis komentar/opini Anda tentang bab ini..." required></textarea>
                        <button id="submitCommentBtn">Kirim Komentar</button>
                    </div>

                    <div class="comments-list" id="commentsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIG FIREBASE (GANTI DENGAN PUNYA ANDA!)
        const firebaseConfig = {
  apiKey: "AIzaSyAPirxknnoLy0poK0COXOaIfRSQ2MRNt-A",
  authDomain: "ceritakuw17.firebaseapp.com",
  databaseURL: "https://ceritakuw17-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ceritakuw17",
  storageBucket: "ceritakuw17.firebasestorage.app",
  messagingSenderId: "523139592598",
  appId: "1:523139592598:web:521645fc4e0e6367baedb7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let activeLibraryData = {};
        let selectedNovelId = null;
        let selectedChapterIndex = 0;

        document.getElementById('backToLibBtn').addEventListener('click', closeReader);
        document.getElementById('chapterSelect').addEventListener('change', (e) => {
            selectedChapterIndex = parseInt(e.target.value);
            loadChapterContents();
        });
        document.getElementById('submitCommentBtn').addEventListener('click', postComment);

        // Fetch Cloud Data secara realtime
        onValue(ref(db, 'library/'), (snapshot) => {
            activeLibraryData = snapshot.val() || {};
            renderLibrary();
            if(selectedNovelId) {
                loadChapterContents(); // Update otomatis jika ada bab atau komentar baru masuk
            }
        });

        function renderLibrary() {
            const grid = document.getElementById('novelGridContainer');
            grid.innerHTML = '';
            
            Object.keys(activeLibraryData).forEach(key => {
                const n = activeLibraryData[key];
                const card = document.createElement('div');
                card.className = 'novel-card';
                card.onclick = () => openReader(key);
                card.innerHTML = `
                    <img src="${n.coverUrl || 'https://via.placeholder.com/220x280?text=No+Cover'}" alt="Cover">
                    <div class="novel-card-info">
                        <h3>${n.title}</h3>
                        <p>Karya: ${n.author}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openReader(novelId) {
            selectedNovelId = novelId;
            selectedChapterIndex = 0;
            document.getElementById('libraryView').classList.add('hidden');
            document.getElementById('readerView').classList.remove('hidden');
            
            const novel = activeLibraryData[novelId];
            document.getElementById('readerNovelTitle').innerText = novel.title;
            document.getElementById('readerNovelAuthor').innerText = `Karya: ${novel.author}`;
            
            const select = document.getElementById('chapterSelect');
            select.innerHTML = '';
            (novel.chapters || []).forEach((ch, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                opt.innerText = ch.title;
                select.appendChild(opt);
            });

            loadChapterContents();
        }

        function loadChapterContents() {
            const novel = activeLibraryData[selectedNovelId];
            if(!novel || !novel.chapters || !novel.chapters[selectedChapterIndex]) return;

            const ch = novel.chapters[selectedChapterIndex];
            document.getElementById('readerChapterTitle').innerText = ch.title;
            document.getElementById('chapterSelect').value = selectedChapterIndex;

            // Render Blok Isi Cerita
            const contentDiv = document.getElementById('chapterContent');
            contentDiv.innerHTML = '';
            (ch.blocks || []).forEach(b => {
                if(b.type === 'text') {
                    const p = document.createElement('p');
                    p.innerText = b.value;
                    contentDiv.appendChild(p);
                } else {
                    const img = document.createElement('img');
                    img.src = b.value;
                    contentDiv.appendChild(img);
                }
            });

            // Sinkronisasi Membaca & Merender Komentar
            renderComments(ch.comments);
        }

        function renderComments(commentsData) {
            const container = document.getElementById('commentsContainer');
            container.innerHTML = '';
            
            if(!commentsData) {
                document.getElementById('commentCount').innerText = '0';
                container.innerHTML = `<p style="font-size:0.9rem; color:#888; text-align:center;">Belum ada diskusi di bab ini. Jadilah yang pertama!</p>`;
                return;
            }

            const keys = Object.keys(commentsData);
            document.getElementById('commentCount').innerText = keys.length;

            keys.forEach(key => {
                const c = commentsData[key];
                const div = document.createElement('div');
                div.className = 'comment-item';
                
                let replyHTML = '';
                if(c.reply) {
                    replyHTML = `
                        <div class="admin-reply">
                            <div class="admin-reply-header">✍️ Balasan Admin:</div>
                            <div class="comment-body">${c.reply}</div>
                        </div>
                    `;
                }

                div.innerHTML = `
                    <div class="comment-header">
                        <span>👤 ${c.name}</span>
                        <span>${c.date || ''}</span>
                    </div>
                    <div class="comment-body">${c.text}</div>
                    ${replyHTML}
                `;
                container.appendChild(div);
            });
        }

        function postComment() {
            const nameInput = document.getElementById('commentorName');
            const textInput = document.getElementById('commentorText');
            
            const name = nameInput.value.trim();
            const text = textInput.value.trim();

            if(!name || !text) {
                alert("Mohon isi nama dan komentar Anda!");
                return;
            }

            const dateStr = new Date().toLocaleDateString('id-ID', { hour: '2-digit', minute: '2-digit' });
            
            const newComment = {
                name: name,
                text: text,
                date: dateStr,
                reply: "" // default kosong untuk dibalas admin nanti
            };

            // Simpan langsung ke endpoint spesifik bab tersebut di Firebase
            const commentRef = ref(db, `library/${selectedNovelId}/chapters/${selectedChapterIndex}/comments`);
            const newCommentPush = push(commentRef);
            
            set(newCommentPush, newComment).then(() => {
                textInput.value = ''; // Reset form input teks saja
                alert("Komentar berhasil dikirim!");
            });
        }

        function closeReader() {
            selectedNovelId = null;
            document.getElementById('libraryView').classList.remove('hidden');
            document.getElementById('readerView').classList.add('hidden');
        }
    </script>
</body>
</html>
