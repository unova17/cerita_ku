<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Situs Baca Novel Modern - Cloud Real-Time</title>
    <style>
        :root {
            --bg-color: #f4f1ea; /* Warna kertas koran agar mata tidak lelah */
            --text-color: #2b2b2b;
            --primary-color: #8c6239;
            --card-bg: #ffffff;
            --border-color: #e0dacb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Georgia', serif; /* Font nyaman khas novel */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            padding: 0;
        }

        /* NAVBAR RESPONSIVE */
        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--primary-color);
            text-decoration: none;
            font-family: sans-serif;
        }

        /* LAYOUT UTAMA */
        .main-layout {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* AREA KATALOG NOVEL */
        .catalog-section h2 {
            margin-bottom: 20px;
            font-family: sans-serif;
            color: #4a3728;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 5px;
        }

        .novel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .novel-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .novel-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .novel-cover {
            width: 90px;
            height: 130px;
            object-fit: cover;
            background: #e5e5e5;
        }

        .novel-details {
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .novel-details h3 {
            font-size: 1.1rem;
            color: #111;
            margin-bottom: 5px;
            font-family: sans-serif;
        }

        .novel-details p {
            font-size: 0.85rem;
            color: #666;
            font-family: sans-serif;
        }

        .read-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            align-self: flex-start;
            font-family: sans-serif;
            font-weight: bold;
        }

        /* AREA MEMBACA NOVEL */
        .reading-section {
            background: var(--card-bg);
            padding: 30px 40px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .btn-back {
            background: none;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-bottom: 25px;
            font-family: sans-serif;
        }

        .btn-back:hover {
            background: var(--primary-color);
            color: white;
        }

        .novel-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 20px;
        }

        .novel-header h1 {
            font-size: 1.8rem;
            color: #111;
            margin-bottom: 8px;
        }

        .novel-header .author {
            font-size: 0.95rem;
            color: #666;
            font-style: italic;
        }

        .chapter-selector-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            font-family: sans-serif;
        }

        .chapter-select {
            padding: 8px 15px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 0.9rem;
            background: white;
        }

        /* RENDER STRUKTUR BLOG URUT */
        .content-area p {
            margin-bottom: 20px;
            text-indent: 2em;
            text-align: justify;
            font-size: 1.15rem;
            color: #2b2b2b;
        }

        .content-illustration {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            margin: 25px auto;
            display: block;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .reading-section { padding: 20px 15px; }
            .novel-header h1 { font-size: 1.4rem; }
            .content-area p { font-size: 1.05rem; text-indent: 1.5em; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="#" class="logo" id="logoLink">📚 NovelKita</a>
            <span style="font-size: 0.85rem; font-family:sans-serif; color:#888;">Mode Pembaca</span>
        </div>
    </header>

    <main class="main-layout">
        <section id="catalogSection" class="catalog-section">
            <h2>Katalog Novel Terbaru</h2>
            <div id="novelGrid" class="novel-grid">
                <p style="text-align: center; font-family: sans-serif; color: #888;">Menghubungkan ke server cloud...</p>
            </div>
        </section>

        <section id="readingSection" class="reading-section hidden">
            <button class="btn-back" id="btnBack">← Kembali ke Katalog</button>
            
            <div class="novel-header">
                <h1 id="activeNovelTitle">Judul Novel</h1>
                <div class="author" id="activeNovelAuthor">Oleh: Penulis</div>
            </div>

            <div class="chapter-selector-container">
                <label for="chapterSelect">Pilih Bab: </label>
                <select id="chapterSelect" class="chapter-select"></select>
            </div>

            <div id="chapterTitle" style="text-align: center; font-size: 1.3rem; font-weight: bold; margin-bottom: 25px; color: var(--primary-color);"></div>

            <div id="chapterContent" class="content-area"></div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ==========================================
        // WAJIB: Pastikan Firebase Config ini SAMA PERSIS dengan yang di admin.html
        // ==========================================
        const firebaseConfig = {
        apiKey: "AIzaSyAPirxknnoLy0poK0COXOaIfRSQ2MRNt-A",
  	authDomain: "ceritakuw17.firebaseapp.com",
  	databaseURL: "https://ceritakuw17-default-rtdb.asia-southeast1.firebasedatabase.app",
  	projectId: "ceritakuw17",
  	storageBucket: "ceritakuw17.firebasestorage.app",
  	messagingSenderId: "523139592598",
        appId: "1:523139592598:web:521645fc4e0e6367baedb7"
        };

        // Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // State Global Aplikasi Pembaca
        let globalLibraryData = {};
        let activeNovel = null;

        // Pasang Event Listener Awal (Scope ES Modules)
        document.getElementById('logoLink').addEventListener('click', showCatalog);
        document.getElementById('btnBack').addEventListener('click', showCatalog);
        document.getElementById('chapterSelect').addEventListener('change', (e) => loadChapter(e.target.value));

        function showCatalog() {
            document.getElementById('catalogSection').classList.remove('hidden');
            document.getElementById('readingSection').classList.add('hidden');
        }

        // KONEKSI REAL-TIME: Otomatis merender data jika admin melakukan perubahan/penambahan novel
        const libraryRef = ref(db, 'library/');
        onValue(libraryRef, (snapshot) => {
            const data = snapshot.val();
            globalLibraryData = data || {};
            
            const grid = document.getElementById('novelGrid');
            grid.innerHTML = '';

            if (Object.keys(globalLibraryData).length === 0) {
                grid.innerHTML = '<p style="text-align:center; font-family:sans-serif; color:#666; grid-column: 1/-1;">Belum ada novel yang diterbitkan secara online.</p>';
                return;
            }

            // Render daftar katalog secara dinamis
            Object.keys(globalLibraryData).forEach((key) => {
                const novel = globalLibraryData[key];
                const card = document.createElement('div');
                card.className = 'novel-card';
                card.id = `card_${key}`;

                const cover = novel.coverUrl 
                    ? `<img src="${novel.coverUrl}" class="novel-cover" alt="Cover">`
                    : `<div class="novel-cover" style="display:flex; align-items:center; justify-content:center; font-size:11px; text-align:center; padding:10px; background:#e2dcd0; color:#5e5241;">No Cover</div>`;

                card.innerHTML = `
                    ${cover}
                    <div class="novel-details">
                        <div>
                            <h3>${novel.title}</h3>
                            <p>Penulis: ${novel.author}</p>
                            <p style="margin-top:5px; color:#8c6239; font-weight:bold;">${novel.chapters ? novel.chapters.length : 0} Bab Aktif</p>
                        </div>
                        <button class="read-btn">Mulai Baca</button>
                    </div>
                `;
                grid.appendChild(card);

                // Tambahkan event klik untuk membuka konten novel
                document.getElementById(`card_${key}`).addEventListener('click', () => openNovel(key));
            });

            // Jika pembaca sedang membuka suatu novel yang kebetulan sedang diedit admin, perbarui data bab secara langsung
            if (activeNovel && globalLibraryData[activeNovel.uid]) {
                const currentChapIdx = document.getElementById('chapterSelect').value;
                openNovel(activeNovel.uid, currentChapIdx);
            }
        });

        function openNovel(novelId, TargetChapterIdx = 0) {
            const novelData = globalLibraryData[novelId];
            if (!novelData) return;

            // Simpan referensi unik ID novel yang sedang aktif
            activeNovel = { uid: novelId, ...novelData };

            document.getElementById('catalogSection').classList.add('hidden');
            document.getElementById('readingSection').classList.remove('hidden');

            document.getElementById('activeNovelTitle').innerText = activeNovel.title;
            document.getElementById('activeNovelAuthor').innerText = `Karya: ${activeNovel.author}`;

            // Bangun ulang opsi selektor bab
            const select = document.getElementById('chapterSelect');
            select.innerHTML = '';
            
            const chapters = activeNovel.chapters || [];
            chapters.forEach((chap, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                opt.innerText = `Bab ${idx + 1}`;
                select.appendChild(opt);
            });

            loadChapter(TargetChapterIdx);
        }

        function loadChapter(idx) {
            const chapters = activeNovel.chapters || [];
            const chapter = chapters[parseInt(idx)];
            
            if (!chapter) return;

            document.getElementById('chapterTitle').innerText = chapter.title;
            const contentArea = document.getElementById('chapterContent');
            contentArea.innerHTML = '';

            // Render seluruh blok elemen (Teks / Gambar) secara urut sesuai pembuatan di admin
            const blocks = chapter.blocks || [];
            blocks.forEach(block => {
                if (block.type === 'text') {
                    const p = document.createElement('p');
                    p.innerText = block.value;
                    contentArea.appendChild(p);
                } else if (block.type === 'image' && block.value) {
                    const img = document.createElement('img');
                    img.src = block.value;
                    img.className = 'content-illustration';
                    img.alt = 'Ilustrasi cerita';
                    contentArea.appendChild(img);
                }
            });

            document.getElementById('chapterSelect').value = idx;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
